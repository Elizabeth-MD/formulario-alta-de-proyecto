<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Elizabeth Madrid">
    <title>Formulario de Alta de Proyecto</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:,">
    <script src="js/script.js" defer></script>
</head>
<body>
    <div class="lab-card">
        <h2>🚀 Nuevo Proyecto</h2>
        <form id="formulario-proyecto">
            <input type="text" id="nombre" placeholder="Nombre del proyecto" class="bordeYsombra borde-radius">
            <p id="frase-caracteres">Caracteres: <span id="numero-caracteres">X</span>/20</p>

            <select id="categoria" class="bordeYsombra borde-radius">
                <option value="">Selecciona categoría...</option>
                <option value="web">Desarrollo Web</option>
                <option value="design">Diseño UI/UX</option>
                <option value="app">Aplicación Móvil</option>
            </select>

            <div class="radio-group" class="bordeYsombra borde-radius">
                <p>Prioridad:</p>
                <input type="radio" name="prioridad" value="alta" id="p-alta"> <label for="p-alta">Alta</label>
                <input type="radio" name="prioridad" value="baja" id="p-baja" checked> <label for="p-baja">Baja</label>
            </div>

            <div class="check-group" class="bordeYsombra borde-radius">
                <p>Condiciones:</p>
                <input type="checkbox" id="terminos">
                <label for="terminos">Acepto las condiciones</label>
            </div>

            <button type="submit" id="btn-enviar" class="bordeYsombra">REGISTRAR</button>
        </form>

        <div id="mensaje-error"></div>
        <div id="resultado-registro"></div>
    </div>
</body>
</html>
